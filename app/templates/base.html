<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title if title else app_name }}</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <header>
        <div class="brand">
            <div class="brand-logo-box">
                <img src="/static/icon.png" alt="Logo empresa" class="brand-logo" />
            </div>
            <h1>{{ app_name }}</h1>
        </div>
        <nav>
            <a href="/admin">Dashboard</a>
            <a href="/admin/taxpayers">Contribuyentes</a>
            <a href="/admin/settings/sources">Fuentes</a>
            <a href="/admin/settings/api-clients">API</a>
            <a href="/admin/settings/users">Usuarios</a>
            <a href="/admin/settings/smtp">SMTP</a>
            <a href="/logout">Salir</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
